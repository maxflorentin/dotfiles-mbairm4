# tmux config

# ── TPM (Tmux Plugin Manager) ──────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'aomerk/tmux-claude-sessions'

# Claude sessions: prefix + g to browse/resume conversations
# set -g @claude_sessions_key 'g'
# set -g @claude_sessions_popup_width '80%'
# set -g @claude_sessions_popup_height '75%'

# True color + cursor style support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",*:Ss=\\E[%p1%d q:Se=\\E[5 q"

# Cursor: blinking bar (pipe) by default
set -ga terminal-overrides ",*:Cs=\\E]12;%p1%s\\007"

# Key passthrough
set -gw xterm-keys on
set -s extended-keys on

# General
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -s escape-time 0
set -g renumber-windows on
set -g focus-events on

# ── Theme: Snazzy ───────────────────────────────
# Downloaded from ivnvxd/tmux-snazzy
source-file ~/.tmux.snazzy.theme

# ── Time tracking ────────────────────────────────
# Pulse-based: cron runs `work-tracker pulse` every 5 min
# which checks #{session_activity} to detect real activity

# ── TPM init (keep at bottom) ───────────────────
run '~/.tmux/plugins/tpm/tpm'
