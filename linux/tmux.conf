# tmux config - Pure/minimal style (matches Starship Pure prompt)

# True color + cursor style support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",*:Ss=\\E[%p1%d q:Se=\\E[5 q"

# Cursor: blinking bar (pipe) by default
set -ga terminal-overrides ",*:Cs=\\E]12;%p1%s\\007"

# General
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -s escape-time 0
set -g renumber-windows on
set -g focus-events on

# ── Pane borders ──────────────────────────────────
set -g pane-border-style "fg=#3a3a3a"
set -g pane-active-border-style "fg=#6c6c6c"
set -g pane-border-lines single

# ── Status bar ────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-style "fg=#808080 bg=default"

# Left: session name in purple (like Pure ❯)
set -g status-left "#[fg=#b294bb]#S #[fg=#3a3a3a]│ "
set -g status-left-length 20

# Center: windows
setw -g window-status-format "#[fg=#585858]#I:#W"
setw -g window-status-current-format "#[fg=#8abeb7]#I:#W"
setw -g window-status-separator "  "

# Right: system info
set -g status-right-length 80
set -g status-right "#[fg=#3a3a3a]│ #[fg=#585858]#(docker ps -q 2>/dev/null | wc -l | tr -d ' ')#[fg=#3a3a3a]d #[fg=#585858]#(free -h 2>/dev/null | awk '/Mem/{print $3}' || echo '-')#[fg=#3a3a3a]m #[fg=#585858]#(sudo wg show 2>/dev/null | grep -c interface || echo 0)#[fg=#3a3a3a]v #[fg=#3a3a3a]│ #[fg=#585858]%H:%M"

# ── Messages ──────────────────────────────────────
set -g message-style "fg=#b294bb bg=default"
set -g message-command-style "fg=#8abeb7 bg=default"

# ── Mode (copy, etc) ─────────────────────────────
setw -g mode-style "fg=default bg=#2a2a2a"

# ── Time tracking ────────────────────────────────
set-hook -g client-session-changed 'run-shell "~/.local/bin/work-tracker start \"#{session_name}\" \"\" pi >/dev/null 2>&1 || true"'
set-hook -g client-detached 'run-shell "~/.local/bin/work-tracker stop \"#{session_name}\" \"\" pi >/dev/null 2>&1 || true"'
